<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Algoritmo Óptimo - Paginación</title>

    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="optimo.css">
</head>
<body>

<section class="slide-container active">
    <div class="content-area align-center">

        <p class="subtitle">MÓDULO DE MEMORIA VIRTUAL</p>
        <h2 class="header-large">ALGORITMO ÓPTIMO</h2>

        <!-- PANEL -->
        <div class="panel-config">

            <div class="config-item">
                <label>FRAMES</label>
                <select id="mem-frames">
                    <option value="4">4</option>
                    <option value="8">8</option>
                </select>
            </div>

            <div class="config-item">
                <label>PROCESOS</label>
                <select id="mem-procesos">
                    <option value="8">8</option>
                    <option value="16">16</option>
                </select>
            </div>

            <div class="config-item">
                <label>TIEMPO</label>
                <input type="number" id="mem-tiempo" value="20" min="10" max="70">
            </div>

        </div>

        <button class="btn-ui glow" id="btn-ejecutar">
            EJECUTAR SIMULACIÓN
        </button>

        <div id="resultado" class="resultado-box"></div>

    </div>
</section>
<script src="optimo.js"></script>
</body>
</html>
